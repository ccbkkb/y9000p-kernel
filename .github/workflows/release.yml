name: Build AW88399 Kernel

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources 2>/dev/null
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null
          sudo rm -f /etc/apt/sources.list.d/microsoft.list 2>/dev/null
          sudo sed -i '/packages.microsoft.com/d' /etc/apt/sources.list 2>/dev/null
          sudo apt update
          sudo apt install -y \
            build-essential flex bison libssl-dev libelf-dev \
            libncurses-dev dwarves dpkg-dev fakeroot wget xz-utils \
            debhelper-compat libdw-dev \
            bc kmod cpio rsync

      - name: Download Linux 7.0 kernel source
        run: |
          cd ${{ runner.temp }}
          wget https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz
          tar xf linux-7.0.tar.xz
          echo "KERNEL_DIR=${{ runner.temp }}/linux-7.0" >> $GITHUB_ENV

      - name: Download patch and firmware
        run: |
          wget https://raw.githubusercontent.com/nadimkobeissi/16iax10h-linux-sound-saga/main/fix/patches/16iax10h-audio-linux-7.0.patch \
            -O ${{ runner.temp }}/patch
          wget https://raw.githubusercontent.com/nadimkobeissi/16iax10h-linux-sound-saga/main/fix/firmware/aw88399_acf.bin \
            -O ${{ runner.temp }}/aw88399_acf.bin

      - name: Apply patch
        run: |
          cd ${{ env.KERNEL_DIR }}
          patch -p1 < ${{ runner.temp }}/patch

      - name: Configure and build
        run: |
          cd ${{ env.KERNEL_DIR }}
          make defconfig
          cat >> .config << 'KCFG'
          CONFIG_SND_HDA_SCODEC_AW88399=m
          CONFIG_SND_HDA_SCODEC_AW88399_I2C=m
          CONFIG_SND_SOC_AW88399=m
          KCFG
          make olddefconfig
          make -j$(nproc) bindeb-pkg LOCALVERSION=-aw88399

      - name: Collect artifacts and generate checksums
        run: |
          mkdir -p ${{ runner.temp }}/release
          # 拷贝内核 debs
          cp ${{ runner.temp }}/linux-*.deb ${{ runner.temp }}/release/
          # 拷贝固件
          cp ${{ runner.temp }}/aw88399_acf.bin ${{ runner.temp }}/release/
          # 生成 SHA256 校验文件
          cd ${{ runner.temp }}/release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /home/runner/work/_temp/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
