name: Build AW88399 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev \
            libncurses-dev dwarves dpkg-dev fakeroot wget xz-utils

      - name: Download Linux 7.0 kernel source
        run: |
          cd ${{ runner.temp }}
          wget https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz
          tar xf linux-7.0.tar.xz
          echo "KERNEL_DIR=${{ runner.temp }}/linux-7.0" >> $GITHUB_ENV

      - name: Download Ubuntu 26.04 kernel config
        run: |
          cd ${{ env.KERNEL_DIR }}
          wget https://git.launchpad.net/~ubuntu-kernel/ubuntu/+source/linux/+git/resolute/plain/debian.resolute/config/config.common.ubuntu?h=Ubuntu-7.0.0-22.22 \
            -O ubuntu-config 2>/dev/null || \
          wget http://archive.ubuntu.com/ubuntu/pool/main/l/linux/linux-config-7.0.0-22-generic_7.0.0-22.22_amd64.deb \
            -O /tmp/linux-config.deb && \
            dpkg-deb -x /tmp/linux-config.deb /tmp/config-extract && \
            cp /tmp/config-extract/boot/config-7.0.0-22-generic ubuntu-config

      - name: Download patch and firmware
        run: |
          wget https://raw.githubusercontent.com/nadimkobeissi/16iax10h-linux-sound-saga/main/fix/patches/16iax10h-audio-linux-7.0.patch \
            -O ${{ runner.temp }}/patch
          wget https://raw.githubusercontent.com/nadimkobeissi/16iax10h-linux-sound-saga/main/fix/firmware/aw88399_acf.bin \
            -O ${{ runner.temp }}/aw88399_acf.bin

      - name: Apply patch
        run: |
          cd ${{ env.KERNEL_DIR }}
          patch -p1 < ${{ runner.temp }}/patch

      - name: Configure and build
        run: |
          cd ${{ env.KERNEL_DIR }}
          cp ubuntu-config .config 2>/dev/null || true
          cat >> .config << 'KCFG'
          CONFIG_SND_HDA_SCODEC_AW88399=m
          CONFIG_SND_HDA_SCODEC_AW88399_I2C=m
          CONFIG_SND_SOC_AW88399=m
          KCFG
          make olddefconfig
          make -j$(nproc) deb-pkg LOCALVERSION=-aw88399

      - name: Upload kernel debs
        uses: actions/upload-artifact@v4
        with:
          name: aw88399-kernel-debs
          path: ${{ runner.temp }}/linux-*.deb
          retention-days: 7

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: aw88399-firmware
          path: ${{ runner.temp }}/aw88399_acf.bin
          retention-days: 7
